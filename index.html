<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#f97316"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Phoenix Classes"/>
<title>Phoenix Classes</title>
<style>
:root{--bg:#0a0d14;--card:#111827;--border:#1f2937;--text:#f1f5f9;--muted:#6b7280;--accent:#f97316;--accent2:#ea580c;--green:#22c55e;--red:#ef4444;--blue:#3b82f6;--purple:#8b5cf6;--yellow:#eab308;}
.light{--bg:#f8fafc;--card:#ffffff;--border:#e2e8f0;--text:#0f172a;--muted:#64748b;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);font-family:Arial,sans-serif;color:var(--text);font-size:14px;overflow-x:hidden;transition:background .3s,color .3s;}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);display:flex;z-index:100;height:60px;}
.bn-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);font-size:9px;gap:2px;padding:4px 0;}
.bn-item.active{color:var(--accent);}
.bn-icon{font-size:18px;}
.main{padding:16px 14px 76px;}
.app-header{background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:16px;padding:18px;margin-bottom:16px;position:relative;overflow:hidden;}
.app-header::before{content:'🔥';position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:44px;opacity:.2;}
.app-header-title{font-size:19px;font-weight:800;color:#fff;}
.app-header-sub{font-size:11px;color:#fed7aa;margin-top:2px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:12px;}
.card-title{font-size:12px;font-weight:800;color:var(--accent);margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;}
.stat-num{font-size:20px;font-weight:800;line-height:1;}
.stat-label{font-size:9px;color:var(--muted);margin-top:3px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;}
label{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:.3px;}
input,select,textarea{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;color:var(--text);padding:9px 12px;font-size:13px;outline:none;box-sizing:border-box;font-family:Arial,sans-serif;}
input:focus,select:focus,textarea:focus{border-color:var(--accent);}
.btn{color:#fff;border:none;border-radius:10px;padding:11px 14px;font-size:13px;font-weight:700;cursor:pointer;width:100%;margin-top:8px;font-family:Arial,sans-serif;}
.btn-orange{background:linear-gradient(135deg,#f97316,#ea580c);}
.btn-blue{background:linear-gradient(135deg,#3b82f6,#2563eb);}
.btn-green{background:linear-gradient(135deg,#22c55e,#16a34a);}
.btn-red{background:linear-gradient(135deg,#ef4444,#dc2626);}
.btn-purple{background:linear-gradient(135deg,#8b5cf6,#7c3aed);}
.btn-gray{background:var(--border);color:var(--muted);}
.btn-wa{background:#25d366;}
.btn-sm{color:#fff;border:none;border-radius:7px;padding:5px 10px;font-size:11px;font-weight:700;cursor:pointer;font-family:Arial,sans-serif;}
.chip{display:inline-block;border-radius:20px;padding:5px 12px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:var(--bg);color:var(--muted);margin:2px;}
.chip.on{background:var(--accent);color:#fff;border-color:var(--accent);}
.badge{border-radius:20px;padding:2px 9px;font-size:10px;font-weight:700;display:inline-block;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{text-align:left;padding:8px 7px;font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;border-bottom:1px solid var(--border);letter-spacing:.3px;}
td{padding:9px 7px;border-bottom:1px solid var(--border);vertical-align:middle;}
.empty{color:var(--muted);text-align:center;padding:24px;font-size:12px;}
.mb{margin-bottom:10px;}
.titem{padding:12px;border-radius:10px;cursor:pointer;margin-bottom:7px;background:var(--bg);border:1.5px solid var(--border);}
.titem.on{border-color:var(--accent);background:rgba(249,115,22,.07);}
.toast{position:fixed;bottom:68px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:9px 18px;border-radius:20px;font-size:12px;font-weight:700;z-index:9999;display:none;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.3);}
.toast.err{background:var(--red);}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.topbar-title{font-size:16px;font-weight:800;color:var(--accent);}
.icon-btn{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:7px 10px;cursor:pointer;font-size:16px;color:var(--text);}
.theme-dot{width:26px;height:26px;border-radius:50%;cursor:pointer;border:3px solid transparent;display:inline-block;margin:3px;}
.theme-dot.on{border-color:var(--text);}
.stu-photo{width:34px;height:34px;border-radius:50%;object-fit:cover;border:2px solid var(--border);}
.stu-photo-ph{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;flex-shrink:0;}
.bar-wrap{margin-bottom:8px;}
.bar-label{font-size:11px;color:var(--muted);margin-bottom:3px;display:flex;justify-content:space-between;}
.bar-bg{background:var(--border);border-radius:20px;height:9px;overflow:hidden;}
.bar-fill{height:9px;border-radius:20px;}
.pay-item{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);}
.pay-amount{font-size:16px;font-weight:800;color:var(--green);}
.pay-date{font-size:10px;color:var(--muted);}
.fee-progress{background:var(--bg);border-radius:10px;padding:10px 12px;margin-bottom:8px;border:1px solid var(--border);}
.toggle{position:relative;width:44px;height:24px;cursor:pointer;}
.toggle input{opacity:0;width:0;height:0;}
.toggle-slider{position:absolute;top:0;left:0;right:0;bottom:0;background:var(--border);border-radius:24px;transition:.3s;}
.toggle-slider:before{content:'';position:absolute;height:18px;width:18px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s;}
.toggle input:checked+.toggle-slider{background:var(--accent);}
.toggle input:checked+.toggle-slider:before{transform:translateX(20px);}
.day-header{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-radius:10px;padding:8px 12px;font-weight:800;font-size:13px;margin-bottom:8px;}
.setting-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border);}
</style>
</head>
<body>
<div class="main" id="app">Loading...</div>
<iframe name="hidden_iframe" style="display:none"></iframe>
<div class="bottom-nav">
  <div class="bn-item active" onclick="go('dashboard')" id="nav-dashboard"><div class="bn-icon">🏠</div><span>Home</span></div>
  <div class="bn-item" onclick="go('students')" id="nav-students"><div class="bn-icon">👨‍🎓</div><span>Students</span></div>
  <div class="bn-item" onclick="go('attendance')" id="nav-attendance"><div class="bn-icon">📋</div><span>Attend</span></div>
  <div class="bn-item" onclick="go('marks')" id="nav-marks"><div class="bn-icon">📊</div><span>Marks</span></div>
  <div class="bn-item" onclick="go('fees')" id="nav-fees"><div class="bn-icon">💰</div><span>Fees</span></div>
  <div class="bn-item" onclick="go('whatsapp')" id="nav-whatsapp"><div class="bn-icon">💬</div><span>WhatsApp</span></div>
  <div class="bn-item" onclick="go('more')" id="nav-more"><div class="bn-icon">⚙️</div><span>More</span></div>
</div>
<div class="toast" id="toast"></div>
<input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(this)"/>
<input type="file" id="photoFile" accept="image/*" style="display:none" onchange="uploadPhoto(this)"/>

<script>
// ── GOOGLE SHEETS API ────────────────────────────────────────────
var API_URL='https://script.google.com/macros/s/AKfycbw_n1ucp7EZWpEZTgG50qcp7s_BucHGiDMigwGKbPO2Tzut3mQAPlkAc8YN0WIUxzpD/exec';

function syncToSheets(){
  showSyncBar('☁️ Saving to Google Sheets...',false);
  try{
    var payload={
      action:'save',
      payload:{
        students:DB.students,
        attendance:DB.attendance,
        marks:DB.marks,
        fees:DB.fees,
        notices:DB.notices||[],
        schedule:DB.schedule||[],
        starStudent:DB.starStudent||null,
        remarks:DB.remarks||{},
        materials:DB.materials||[]
      }
    };
    var encoded=encodeURIComponent(JSON.stringify(payload));
    var cbName='saveCb'+Date.now();
    var script=document.createElement('script');
    var done=false;
    window[cbName]=function(d){
      done=true;
      delete window[cbName];
      try{document.head.removeChild(script);}catch(e){}
      if(d&&d.status==='ok'){
        showSyncBar('✅ Saved to Google Sheets!',false);
      } else {
        showSyncBar('⚠️ Saved locally only.',false);
      }
    };
    script.src=API_URL+'?action=save&callback='+cbName+'&data='+encoded+'&t='+Date.now();
    script.onerror=function(){
      if(!done){
        delete window[cbName];
        showSyncBar('⚠️ Saved locally. Sheet sync failed.',false);
      }
    };
    setTimeout(function(){
      if(!done){
        delete window[cbName];
        try{document.head.removeChild(script);}catch(e){}
        showSyncBar('⚠️ Saved locally. Sheet timeout.',false);
      }
    },20000);
    document.head.appendChild(script);
  }catch(e){showSyncBar('❌ Error: '+e.message,true);}
}

function loadFromSheets(){
  showSyncBar('☁️ Loading from Google Sheets...',false);
  var cbName='loadCb'+Date.now();
  var script=document.createElement('script');
  var done=false;
  window[cbName]=function(d){
    done=true;
    delete window[cbName];
    try{document.head.removeChild(script);}catch(e){}
    try{
      if(d&&d.status==='ok'&&d.data){
        var ld=d.data;
        DB.students=ld.students||[];
        DB.attendance=ld.attendance||{};
        DB.marks=ld.marks||{tests:[],data:{}};
        if(ld.fees){
          if(!ld.fees.classFee)ld.fees.classFee={'Class 8':3000,'Class 9':3500,'Class 10':4000};
          if(!ld.fees.payments)ld.fees.payments={};
          DB.fees=ld.fees;
        }
        // Only update notices if Sheets has data — never delete local notices
        if(ld.notices&&ld.notices.length>0){
          DB.notices=ld.notices;
        } else if(!DB.notices){
          DB.notices=[];
        }
        if(ld.schedule)DB.schedule=ld.schedule;
        if(ld.starStudent!==undefined)DB.starStudent=ld.starStudent;
        if(ld.remarks)DB.remarks=ld.remarks;
        if(ld.materials)DB.materials=ld.materials;else if(!DB.materials)DB.materials=[];
        dbS();render();
        showSyncBar('✅ Synced! '+DB.students.length+' students.',false);
      }else{
        showSyncBar('⚠️ No data in Sheets.',false);
      }
    }catch(e){showSyncBar('❌ Parse error: '+e.message,true);}
  };
  script.src=API_URL+'?action=load&callback='+cbName+'&t='+Date.now();
  script.onerror=function(){
    if(!done){delete window[cbName];showSyncBar('❌ Load failed.',true);}
  };
  setTimeout(function(){
    if(!done){
      delete window[cbName];
      try{document.head.removeChild(script);}catch(e){}
      showSyncBar('❌ Timeout. Try again.',true);
    }
  },20000);
  document.head.appendChild(script);
}

function showSyncBar(msg,err){
  var t=document.getElementById('toast');
  if(!t)return;
  t.textContent=msg;t.className='toast'+(err?' err':'');t.style.display='block';
  if(!err)setTimeout(function(){t.style.display='none';},4000);
}

function dbSWithSync(){
  dbS();
  clearTimeout(window._syncTimer);
  window._syncTimer=setTimeout(function(){syncToSheets();},2000);
}

var DB={
  students:[],attendance:{},marks:{tests:[],data:{}},
  fees:{
    classFee:{'Class 8':3000,'Class 9':3500,'Class 10':4000},
    payments:{} // payments[studentId] = [{date, amount, note}]
  },
  timetable:{},settings:{theme:'orange',darkMode:true},photos:{},notices:[],schedule:[],starStudent:null,remarks:{},materials:[]
};
function dbS(){try{localStorage.setItem('pxDB3',JSON.stringify(DB));}catch(e){}}
function dbL(){
  try{
    var s=localStorage.getItem('pxDB3');
    if(s){DB=JSON.parse(s);}
    if(!DB.timetable)DB.timetable={};
    if(!DB.settings)DB.settings={theme:'orange',darkMode:true};
    if(!DB.photos)DB.photos={};
    if(!DB.notices)DB.notices=[];
    if(!DB.schedule)DB.schedule=[];
    if(!DB.starStudent)DB.starStudent=null;
    if(!DB.remarks)DB.remarks={};
    if(!DB.materials)DB.materials=[];
    if(!DB.fees.classFee)DB.fees.classFee={'Class 8':3000,'Class 9':3500,'Class 10':4000};
    if(!DB.fees.payments)DB.fees.payments={};
  }catch(e){}
}

// ── THEME ─────────────────────────────────────────────────────────
var THEMES={orange:{a:'#f97316',b:'#ea580c'},blue:{a:'#3b82f6',b:'#2563eb'},green:{a:'#22c55e',b:'#16a34a'},purple:{a:'#8b5cf6',b:'#7c3aed'},red:{a:'#ef4444',b:'#dc2626'}};
function applyTheme(){
  var t=THEMES[DB.settings.theme]||THEMES.orange;
  document.documentElement.style.setProperty('--accent',t.a);
  document.documentElement.style.setProperty('--accent2',t.b);
  DB.settings.darkMode?document.body.classList.remove('light'):document.body.classList.add('light');
}

// ── HELPERS ───────────────────────────────────────────────────────
function exportData(){
  try{
    var blob=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');
    var d=new Date();
    a.href=url;a.download='PhoenixClasses_'+d.getDate()+'-'+(d.getMonth()+1)+'-'+d.getFullYear()+'.json';
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    URL.revokeObjectURL(url);toast('Backup downloaded!',false);
  }catch(e){toast('Error: '+e.message,true);}
}
function importData(inp){
  var file=inp.files[0];if(!file)return;
  var r=new FileReader();
  r.onload=function(ev){
    try{
      var d=JSON.parse(ev.target.result);
      if(!d.students){toast('Invalid file!',true);return;}
      DB=d;
      if(!DB.timetable)DB.timetable={};
      if(!DB.settings)DB.settings={theme:'orange',darkMode:true};
      if(!DB.photos)DB.photos={};
      if(!DB.fees.classFee)DB.fees.classFee={'Class 8':3000,'Class 9':3500,'Class 10':4000};
      if(!DB.fees.payments)DB.fees.payments={};
      dbS();applyTheme();render();
      toast('Restored! '+DB.students.length+' students.',false);
    }catch(e){toast('File error!',true);}
  };
  r.readAsText(file);inp.value='';
}
function toast(msg,err){
  var t=document.getElementById('toast');
  t.textContent=msg;t.className='toast'+(err?' err':'');t.style.display='block';
  setTimeout(function(){t.style.display='none';},3000);
}
var photoUploadId=null;
function triggerPhoto(id){photoUploadId=id;document.getElementById('photoFile').click();}
function uploadPhoto(inp){
  var file=inp.files[0];if(!file||!photoUploadId)return;
  var r=new FileReader();

// ── FEE HELPERS ───────────────────────────────────────────────────
function getTotalPaid(sid){
  var pays=DB.fees.payments[sid]||[];
  return pays.reduce(function(s,p){return s+(+p.amount||0);},0);
}
function getYearlyFee(cls){
  return DB.fees.classFee[cls]||0;
}
function getBalance(sid,cls){
  return getYearlyFee(cls)-getTotalPaid(sid);
}
function getTotalCollected(){
  var total=0;
  DB.students.forEach(function(s){total+=getTotalPaid(s.id);});
  return total;
}
function getTotalPending(){
  var total=0;
  DB.students.forEach(function(s){var bal=getBalance(s.id,s.cls);if(bal>0)total+=bal;});
  return total;
}

// ── BADGES ───────────────────────────────────────────────────────
function getBadges(sid,cls){
  var badges=[];
  var pays=DB.fees.payments[sid]||[];
  var totalPaid=getTotalPaid(sid);
  var yearlyFee=getYearlyFee(cls);
  // Fee clear badge
  if(yearlyFee>0&&totalPaid>=yearlyFee)badges.push({icon:'💰',label:'Fee Clear',color:'#22c55e'});
  // Attendance badges
  var attD=0,attP=0;
  for(var k in DB.attendance){if(k.indexOf('_'+cls)>=0){var r=DB.attendance[k];if(r[sid]){attD++;if(r[sid]==='P')attP++;}}}
  var attPct=attD>0?Math.round((attP/attD)*100):0;
  if(attPct===100&&attD>0)badges.push({icon:'📅',label:'Perfect Attendance',color:'#3b82f6'});
  if(attPct>=90&&attD>0)badges.push({icon:'🌟',label:'Star Attendance',color:'#6366f1'});
  // Academic badges
  var tests=(DB.marks.tests||[]).filter(function(t){return t.cls===cls;});
  var md=DB.marks.data||{};
  var totM=0,obtM=0,passCount=0;
  tests.forEach(function(t){var v=Number((md[t.id]||{})[sid]||0);if(v){totM+=t.maxMarks;obtM+=v;if((v/t.maxMarks)*100>=40)passCount++;}});
  var avgPct=totM>0?Math.round((obtM/totM)*100):0;
  if(avgPct>=75)badges.push({icon:'🥇',label:'Top Scorer',color:'#f59e0b'});
  else if(avgPct>=60)badges.push({icon:'🥈',label:'Good Performer',color:'#94a3b8'});
  if(passCount>=3)badges.push({icon:'🔥',label:'Consistent',color:'#f97316'});
  // Star student badge
  if(DB.starStudent&&String(DB.starStudent.id)===String(sid))badges.push({icon:'⭐',label:'Star Student',color:'#eab308'});
  return badges;
}

function badgeHtml(badges){
  if(!badges.length)return '';
  return '<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:6px">'+
    badges.map(function(b){return '<span style="background:'+b.color+'22;color:'+b.color+';border:1px solid '+b.color+'44;border-radius:20px;padding:2px 8px;font-size:10px;font-weight:700">'+b.icon+' '+b.label+'</span>';}).join('')+'</div>';
}

// ── MARKS ─────────────────────────────────────────────────────────
function pgMrk(){
  var tests=DB.marks.tests||[],md=DB.marks.data||{};
  var tlist=tests.length===0?'<div class="empty">No tests yet.</div>':
    tests.map(function(t){
      var sl=DB.students.filter(function(s){return s.cls===t.cls&&(s.subject===t.subject||s.subject==='Both'||t.subject==='Both');});
      var vals=sl.map(function(s){return Number((md[t.id]||{})[s.id]||0);}).filter(function(v){return v>0;});
      var avg=vals.length?(vals.reduce(function(a,b){return a+b;},0)/vals.length).toFixed(1):'—';
      return '<div class="titem '+(selT===t.id?'on':'')+'" style="display:flex;justify-content:space-between;align-items:center">'+
        '<div onclick="selTest('+t.id+')" style="flex:1;cursor:pointer">'+
        '<div style="font-weight:800;font-size:13px">'+esc(t.testName)+'</div>'+
        '<div style="font-size:11px;color:var(--muted);margin-top:3px">'+t.cls+' · '+t.subject+' · '+t.date+' · Avg: '+avg+'/'+t.maxMarks+'</div></div>'+
        '<button class="btn-sm btn-red" onclick="delTest('+t.id+')" style="margin-left:8px;flex-shrink:0">✕</button>'+
        '</div>';
    }).join('');
  var stObj=null;for(var i=0;i<tests.length;i++){if(tests[i].id===selT){stObj=tests[i];break;}}
  var ts=stObj?DB.students.filter(function(s){return s.cls===stObj.cls&&(s.subject===stObj.subject||s.subject==='Both'||stObj.subject==='Both');}):[];
  var mp='<div class="empty">Select a test to enter marks</div>';
  if(stObj){
    var rows=ts.length===0?'<tr><td colspan="4" class="empty">No students.</td></tr>':
      ts.map(function(s,i){
        var val=mEn[s.id]||'';
        var pct=val?(Number(val)/stObj.maxMarks)*100:null;
        var g=pct===null?'—':pct>=75?'A':pct>=60?'B':pct>=40?'C':'D';
        var gc=g==='A'?'#22c55e':g==='B'?'#3b82f6':g==='C'?'#eab308':g==='D'?'#ef4444':'var(--muted)';
        return '<tr><td>'+photoEl(s.id,s.name)+'</td><td style="font-weight:700">'+esc(s.name)+'</td>'+
          '<td><input type="number" style="width:65px" min="0" max="'+stObj.maxMarks+'" value="'+esc(val)+'" onchange="mEn['+s.id+']=this.value" placeholder="0"/></td>'+
          '<td>'+bdg(g,gc)+'</td></tr>';
      }).join('');
    mp='<div style="font-weight:800;font-size:15px;margin-bottom:4px">'+esc(stObj.testName)+'</div>'+
      '<div style="color:var(--muted);font-size:11px;margin-bottom:12px">'+stObj.cls+' · '+stObj.subject+' · Max: '+stObj.maxMarks+'</div>'+
      '<table><thead><tr><th></th><th>Student</th><th>Marks/'+stObj.maxMarks+'</th><th>Grade</th></tr></thead><tbody>'+rows+'</tbody></table>'+
      (ts.length>0?'<button class="btn btn-green" onclick="saveMrk()">💾 Save Marks</button>':'');
  }
  return topbar('Marks & Results')+
    '<div class="card"><div class="card-title">➕ New Test</div>'+
    '<div class="mb"><label>Test Name</label><input id="tn" placeholder="e.g. Unit Test 1"/></div>'+
    '<div class="grid2 mb"><div><label>Class</label><select id="tc">'+CL.map(function(c){return '<option>'+c+'</option>';}).join('')+'</select></div>'+
    '<div><label>Subject</label><select id="tsu">'+SB.map(function(s){return '<option>'+s+'</option>';}).join('')+'</select></div></div>'+
    '<div class="grid2 mb"><div><label>Max Marks</label><input type="number" id="tm" value="100"/></div>'+
    '<div><label>Date</label><input type="date" id="td" value="'+aDt+'"/></div></div>'+
    '<button class="btn btn-orange" onclick="addT()">Create Test</button></div>'+
    '<div class="card"><div class="card-title">📝 All Tests</div>'+tlist+'</div>'+
    '<div class="card">'+mp+'</div>';
}
function addT(){
  var tn=document.getElementById('tn');if(!tn||!tn.value.trim()){toast('Enter test name!',true);return;}
  var t={id:Date.now(),testName:tn.value.trim(),cls:document.getElementById('tc').value,subject:document.getElementById('tsu').value,maxMarks:+document.getElementById('tm').value||100,date:document.getElementById('td').value};
  DB.marks.tests.push(t);dbSWithSync();selT=t.id;mEn={};render();toast('Test created!',false);
}
function selTest(id){selT=id;mEn={};var d=(DB.marks.data||{})[id]||{};for(var k in d)mEn[k]=d[k];render();}
function saveMrk(){if(!DB.marks.data)DB.marks.data={};var cp={};for(var k in mEn)cp[k]=mEn[k];DB.marks.data[selT]=cp;dbSWithSync();toast('Marks saved!',false);render();}
function delTest(id){if(!confirm('Delete this test and all its marks?'))return;DB.marks.tests=DB.marks.tests.filter(function(t){return t.id!==id;});if(DB.marks.data)delete DB.marks.data[id];if(selT===id)selT=null;dbSWithSync();render();toast('Test deleted!',false);}

    fl.map(function(s,i){
      var paid=getTotalPaid(s.id),fee=getYearlyFee(s.cls),bal=fee-paid;

      return '<tr>'+
        '<td>'+photoEl(s.id,s.name)+'</td>'+

        '<td><div style="font-size:11px;color:var(--green);font-weight:700">₹'+paid+'</div>'+
           '<div style="font-size:10px;color:var(--muted)">of ₹'+fee+'</div>'+
           '<div class="bar-bg" style="margin-top:3px;height:5px"><div class="bar-fill" style="width:'+pct+'%;background:var(--green)"></div></div></td>'+
        '<td>'+(bal<=0?bdg('Paid ✓','#22c55e'):bdg('₹'+bal,'#ef4444'))+'</td>'+
        '<td>'+(bal>0?'<button class="btn-sm btn-green" onclick="openPay('+s.id+')">+ Pay</button>':'<span style="font-size:11px;color:var(--green)">✅</span>')+'</td>'+
        '</tr>';
    }).join('');
  // payment modal
  var modal='';
  if(typeof payModalId!=='undefined'&&payModalId){
    var ps=null;for(var i=0;i<DB.students.length;i++){if(DB.students[i].id===payModalId){ps=DB.students[i];break;}}
    if(ps){
      var pbal=getBalance(ps.id,ps.cls);
      modal='<div style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:500;display:flex;align-items:flex-end">'+
        '<div style="background:var(--card);border-radius:20px 20px 0 0;padding:20px;width:100%;border-top:2px solid var(--accent)">'+
        '<div style="font-weight:800;font-size:15px;margin-bottom:4px">💰 Collect Payment</div>'+
        '<div style="font-size:12px;color:var(--muted);margin-bottom:14px">'+esc(ps.name)+' · '+ps.cls+' · Balance: ₹'+pbal+'</div>'+
        '<div class="mb"><label>Amount Received (₹)</label><input type="number" id="pay-amt" placeholder="Enter amount" value="'+pbal+'"/></div>'+
        '<div class="mb"><label>Date</label><input type="date" id="pay-date" value="'+aDt+'"/></div>'+
        '<div class="mb"><label>Note (Optional)</label><input id="pay-note" placeholder="e.g. Installment 1, Cash"/></div>'+
        '<button class="btn btn-green" onclick="savePay()">✅ Save Payment & Send Receipt</button>'+
        '<button class="btn" style="background:#5f259f;margin-top:6px" onclick="window.open(upiLink(+document.getElementById(\'pay-amt\').value||0,\''+esc(ps.name)+'\'),\'_blank\')">📱 Open UPI Payment</button>'+
        '<button class="btn btn-gray" style="margin-top:8px" onclick="payModalId=undefined;render()">Cancel</button>'+
        '</div></div>';
    }
  }
  return '<div class="grid2" style="margin-bottom:14px">'+sc('₹'+totalC,'Collected','#22c55e')+sc('₹'+totalP,'Pending','#ef4444')+'</div>'+
    '<div class="mb">'+cps(['All'].concat(CL),fCl,'setFC')+'</div>'+
    '<div class="card"><div class="card-title">Student Fee Status</div>'+
    '<table><thead><tr><th></th><th>Student</th><th>Paid</th><th>Balance</th><th>Action</th></tr></thead><tbody>'+rows+'</tbody></table></div>'+modal;
}

var payModalId=undefined;
function openPay(id){payModalId=id;render();}
function delPay(sid,idx){
  if(!confirm('Delete this payment?'))return;
  if(!DB.fees.payments[sid])return;
  DB.fees.payments[sid].splice(idx,1);
  dbSWithSync();render();toast('Payment deleted!',false);
}
function delAtt(date,cls){
  if(!confirm('Delete attendance for '+cls+' on '+date+'?'))return;
  var key=date+'_'+cls;
  delete DB.attendance[key];
  dbSWithSync();render();toast('Attendance deleted!',false);
}
function savePay(){
  var amt=document.getElementById('pay-amt');
  var dt=document.getElementById('pay-date');
  var note=document.getElementById('pay-note');
  if(!amt||!+amt.value){toast('Enter valid amount!',true);return;}
  if(!DB.fees.payments[payModalId])DB.fees.payments[payModalId]=[];
  var payment={date:dt?dt.value:aDt,amount:+amt.value,note:note?note.value:''};
  DB.fees.payments[payModalId].push(payment);
  dbSWithSync();
  var ps=null;for(var i=0;i<DB.students.length;i++){if(DB.students[i].id===payModalId){ps=DB.students[i];break;}}
  payModalId=undefined;
  toast('Payment of ₹'+payment.amount+' saved!',false);
  if(ps&&ps.phone){
    var bal=getBalance(ps.id,ps.cls);
    var msg='Dear Parent,\n\n✅ *Payment Receipt*\nPhoenix Classes\n\n'+
      'Student: *'+ps.name+'*\nClass: '+ps.cls+'\n\n'+
      '💰 Amount Paid: *₹'+payment.amount+'*\nDate: '+fmtDate(payment.date)+'\n'+(payment.note?'Note: '+payment.note+'\n':'')+
      '\nTotal Paid: ₹'+getTotalPaid(ps.id)+'\nYearly Fee: ₹'+getYearlyFee(ps.cls)+'\n'+
      (bal<=0?'✅ *Fee Fully Cleared!*':'Remaining Balance: ₹'+bal)+
      '\n\nThank you!\nPhoenix Classes';
    setTimeout(function(){
      if(confirm('Send payment receipt on WhatsApp to '+ps.name+'\'s parent?')){
        waOpen(ps.phone,msg);
      }
    },300);
  }
  render();
}

function pgFeeHistory(){
  var fl=DB.students.filter(function(s){return fCl==='All'||s.cls===fCl;});
  var items=[];
  fl.forEach(function(s){
    (DB.fees.payments[s.id]||[]).forEach(function(p,idx){
      items.push({stu:s,payment:p,idx:idx});
    });
  });
  items.sort(function(a,b){return b.payment.date.localeCompare(a.payment.date);});
  var rows=items.length===0?'<div class="empty">No payments recorded yet.</div>':
    items.map(function(item){
      var s=item.stu,p=item.payment,idx=item.idx;
      return '<div class="pay-item">'+
        '<div style="display:flex;gap:10px;align-items:center">'+photoEl(s.id,s.name)+
        '<div><div style="font-weight:700">'+esc(s.name)+'</div>'+
        '<div style="font-size:10px;color:var(--muted)">'+s.cls+' · '+fmtDate(p.date)+(p.note?' · '+esc(p.note):'')+'</div></div></div>'+
        '<div style="display:flex;align-items:center;gap:8px">'+
        '<div class="pay-amount">₹'+p.amount+'</div>'+
        '<button class="btn-sm btn-red" onclick="delPay('+s.id+','+idx+');feeTab=\'history\'">✕</button>'+
        '</div></div>';
    }).join('');
  var total=items.reduce(function(s,i){return s+i.payment.amount;},0);
  return '<div class="mb">'+cps(['All'].concat(CL),fCl,'setFC')+'</div>'+
    '<div class="card" style="border-color:var(--green)">'+
    '<div style="display:flex;justify-content:space-between;align-items:center">'+
    '<div style="font-size:12px;color:var(--muted)">Total Shown</div>'+
    '<div style="font-size:20px;font-weight:800;color:var(--green)">₹'+total+'</div></div></div>'+
    '<div class="card"><div class="card-title">All Payment History</div>'+rows+'</div>';

function sendBatch(){
  var msg=document.getElementById('wa-msg');
  if(!msg||!msg.value.trim()){toast('Please type a message!',true);return;}
  var text=msg.value.trim();
  var list=DB.students.filter(function(s){return waCls==='All'||s.cls===waCls;});
  if(!list.length){toast('No students found!',true);return;}
  if(!confirm('Send to '+list.length+' students?'))return;
  var i=0;
  function next(){if(i>=list.length){toast('All messages opened! ('+list.length+')',false);return;}var s=list[i];i++;waOpen(s.phone,'Dear Parent,\n\n'+text+'\n\nRegards,\nPhoenix Classes');setTimeout(next,1500);}
  next();
}
function sendAbsent(){
  var dateEl=document.getElementById('wa-att-date');
  var date=dateEl?dateEl.value:aDt;
  var rec=DB.attendance[date+'_'+waAttCls]||{};
  var list=DB.students.filter(function(s){return s.cls===waAttCls&&rec[s.id]==='A';});
  if(!list.length){toast('No absent students on this date!',false);return;}
  if(!confirm('Send absent alert to '+list.length+' parent(s)?'))return;
  var i=0;
  function next(){if(i>=list.length){toast('Sent to '+list.length+' parents!',false);return;}var s=list[i];i++;
    waOpen(s.phone,'Dear Parent,\n\nThis is to inform you that *'+s.name+'* was *ABSENT* from '+s.cls+' on *'+fmtDate(date)+'*.\n\nIf this is incorrect, please contact us.\n\nRegards,\nPhoenix Classes');
    setTimeout(next,1500);}
  next();
}
function sendFeeRemind(){
  var list=DB.students.filter(function(s){return(waCls==='All'||s.cls===waCls)&&getBalance(s.id,s.cls)>0;});
  if(!list.length){toast('No pending fees! ✅',false);return;}
  if(!confirm('Send reminder to '+list.length+' parent(s)?'))return;
  var i=0;
  function next(){if(i>=list.length){toast('Reminders sent! ('+list.length+')',false);return;}var s=list[i];i++;
    var bal=getBalance(s.id,s.cls);var paid=getTotalPaid(s.id);var fee=getYearlyFee(s.cls);
    var msg='Dear Parent,\n\nThis is a gentle reminder for *'+s.name+'* ('+s.cls+')\nPhoenix Classes\n\n'+
      '💰 *Fee Details:*\nYearly Fee: ₹'+fee+'\nPaid Till Date: ₹'+paid+'\n*Balance Due: ₹'+bal+'*\n\nKindly clear the dues at the earliest.\n\nRegards,\nPhoenix Classes';
    waOpen(s.phone,msg);setTimeout(next,1500);}

}
function sendResults(){
  var sel=document.getElementById('wa-test');
  if(!sel||!sel.value){toast('Select a test first!',true);return;}
  var tid=+sel.value;
  var test=null;for(var i=0;i<DB.marks.tests.length;i++){if(DB.marks.tests[i].id===tid){test=DB.marks.tests[i];break;}}
  if(!test){toast('Test not found!',true);return;}
  var md=(DB.marks.data||{})[tid]||{};
  var list=DB.students.filter(function(s){return s.cls===test.cls&&(s.subject===test.subject||s.subject==='Both'||test.subject==='Both');});
  if(!list.length){toast('No students for this test!',true);return;}
  if(!confirm('Send results to '+list.length+' parent(s)?'))return;
  var i=0;
  function next(){if(i>=list.length){toast('Results sent! ('+list.length+')',false);return;}var s=list[i];i++;
    var val=md[s.id]||0;var pct=val?Math.round((val/test.maxMarks)*100):0;
    var g=!val?'—':pct>=75?'A':pct>=60?'B':pct>=40?'C':'D';
    var msg='Dear Parent,\n\n📊 *Result: '+test.testName+'*\nPhoenix Classes\n\n'+
      'Student: *'+s.name+'*\nClass: '+s.cls+' · '+test.subject+'\n\n'+
      '📝 Marks: *'+val+' / '+test.maxMarks+'*\n'+
      '📈 Percentage: *'+pct+'%*\n'+
      '🏆 Grade: *'+g+'*\n\n'+
      (g==='A'?'Excellent! Keep it up! 🌟':g==='B'?'Good work! Keep it up! 👍':g==='C'?'Average. More effort needed. 📖':'Needs improvement. Please focus more. 💪')+
      '\n\nRegards,\nPhoenix Classes';
    waOpen(s.phone,msg);setTimeout(next,1500);}
  next();
}

  localStorage.removeItem('pxDB3');

  clearTimeout(window._syncTimer);

  render();
  toast('All data cleared and synced!',false);

function go(p){
  pg=p;selStu=null;payModalId=undefined;
  document.querySelectorAll('.bn-item').forEach(function(el){el.classList.remove('active');});
  var nav=document.getElementById('nav-'+p);if(nav)nav.classList.add('active');
  render();
}
function render(){
  try{
    var el=document.getElementById('app');if(!el)return;
    if(pg==='dashboard')el.innerHTML=pgHome();
    else if(pg==='students')el.innerHTML=pgStu();
    else if(pg==='attendance')el.innerHTML=pgAtt();
    else if(pg==='marks')el.innerHTML=pgMrk();
    else if(pg==='fees')el.innerHTML=pgFee();
    else if(pg==='whatsapp')el.innerHTML=pgWhatsapp();
    else if(pg==='more')el.innerHTML=pgMore();
    window.scrollTo(0,0);
  }catch(ex){
    document.getElementById('app').innerHTML='<div class="card" style="color:#ef4444;padding:20px"><b>Error:</b> '+ex.message+'<br><button class="btn btn-orange" onclick="render()" style="margin-top:10px">Retry</button></div>';
  }
}
window.onload=function(){
  dbL();
  initDate();
  applyTheme();
  render();
  // Load from Google Sheets on startup — Sheets is the master
  setTimeout(function(){loadFromSheets();},800);
};
